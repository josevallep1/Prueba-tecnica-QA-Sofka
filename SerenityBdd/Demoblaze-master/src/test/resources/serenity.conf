serenity {
      serenity.take.screenshots = FOR_EACH_ACTION
      test.root = "features"
      requirements.dir = "src/test/resources/features"
    }

headless.mode = true
webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["start-maximized"]
    }
  }
}

environments {
    default {
     webdriver.base.url = "https://www.demoblaze.com/"
    }
}